server.port=${PORT:8080}
server.servlet.context-path=

# Database - Use Railway environment variables
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/railway}
spring.datasource.username=${PGUSER:root}
spring.datasource.password=${PGPASSWORD:password}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Email - Use Railway environment variables
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Frontend URLs
app.frontend.urls=${FRONTEND_URLS:http://localhost:3000,http://localhost:3001}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
